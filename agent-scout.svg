<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Scout Agent - 32x32 Pixel Art -->
  
  <!-- Body (green hoodie) -->
  <rect x="10" y="14" width="12" height="12" fill="#48BB78"/>
  <rect x="10" y="14" width="12" height="4" fill="#38A169"/>
  
  <!-- Hood -->
  <rect x="10" y="12" width="12" height="4" fill="#2F855A"/>
  
  <!-- Head -->
  <rect x="11" y="6" width="10" height="8" fill="#F6E05E"/>
  
  <!-- Hair (messy brown) -->
  <rect x="10" y="5" width="4" height="3" fill="#8B4513"/>
  <rect x="14" y="4" width="4" height="3" fill="#8B4513"/>
  <rect x="18" y="5" width="4" height="3" fill="#8B4513"/>
  <rect x="9" y="6" width="2" height="4" fill="#8B4513"/>
  <rect x="21" y="6" width="2" height="4" fill="#8B4513"/>
  
  <!-- Eyes (wide/curious) -->
  <rect x="12" y="9" width="3" height="3" fill="#1A202C"/>
  <rect x="17" y="9" width="3" height="3" fill="#1A202C"/>
  <!-- Eye shine -->
  <rect x="13" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="18" y="10" width="1" height="1" fill="#FFFFFF"/>
  
  <!-- Magnifying glass (held in right hand) -->
  <circle cx="26" cy="18" r="4" fill="none" stroke="#63B3ED" stroke-width="2"/>
  <rect x="28" y="20" width="2" height="5" fill="#718096" transform="rotate(45 29 22.5)"/>
  
  <!-- Arms -->
  <rect x="8" y="16" width="2" height="8" fill="#F6E05E"/>
  <rect x="22" y="16" width="2" height="6" fill="#F6E05E"/>
  
  <!-- Hands -->
  <rect x="7" y="22" width="3" height="3" fill="#F6E05E"/>
  <rect x="23" y="20" width="3" height="3" fill="#F6E05E"/>
  
  <!-- Legs (jeans) -->
  <rect x="12" y="26" width="3" height="6" fill="#2B6CB0"/>
  <rect x="17" y="26" width="3" height="6" fill="#2B6CB0"/>
  
  <!-- Shoes -->
  <rect x="11" y="30" width="5" height="2" fill="#1A202C"/>
  <rect x="16" y="30" width="5" height="2" fill="#1A202C"/>
</svg>
