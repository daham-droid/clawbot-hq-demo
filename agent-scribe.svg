<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Scribe Agent - 32x32 Pixel Art -->
  
  <!-- Body (yellow sweater) -->
  <rect x="10" y="14" width="12" height="12" fill="#ECC94B"/>
  <rect x="10" y="14" width="12" height="4" fill="#D69E2E"/>
  
  <!-- Head -->
  <rect x="11" y="6" width="10" height="8" fill="#F6E05E"/>
  
  <!-- Hair (long, brown) -->
  <rect x="10" y="4" width="12" height="4" fill="#8B4513"/>
  <rect x="9" y="5" width="2" height="8" fill="#8B4513"/>
  <rect x="21" y="5" width="2" height="8" fill="#8B4513"/>
  <rect x="9" y="12" width="3" height="3" fill="#8B4513"/>
  <rect x="20" y="12" width="3" height="3" fill="#8B4513"/>
  
  <!-- Eyes (creative/artistic) -->
  <rect x="12" y="9" width="3" height="2" fill="#1A202C"/>
  <rect x="17" y="9" width="3" height="2" fill="#1A202C"/>
  <!-- Eyelashes -->
  <rect x="12" y="8" width="1" height="1" fill="#1A202C"/>
  <rect x="14" y="8" width="1" height="1" fill="#1A202C"/>
  <rect x="17" y="8" width="1" height="1" fill="#1A202C"/>
  <rect x="19" y="8" width="1" height="1" fill="#1A202C"/>
  
  <!-- Smile -->
  <rect x="14" y="12" width="4" height="1" fill="#1A202C"/>
  
  <!-- Notebook/Pen (held) -->
  <rect x="24" y="16" width="6" height="8" fill="#FFFFFF"/>
  <rect x="25" y="17" width="4" height="6" fill="#F7FAFC"/>
  <!-- Lines on paper -->
  <rect x="26" y="19" width="3" height="1" fill="#A0AEC0"/>
  <rect x="26" y="21" width="3" height="1" fill="#A0AEC0"/>
  <!-- Pen -->
  <rect x="23" y="14" width="2" height="6" fill="#4A5568"/>
  <rect x="23" y="13" width="2" height="2" fill="#1A202C"/>
  
  <!-- Arms -->
  <rect x="8" y="16" width="2" height="8" fill="#F6E05E"/>
  <rect x="22" y="16" width="2" height="6" fill="#F6E05E"/>
  
  <!-- Hands -->
  <rect x="7" y="22" width="3" height="3" fill="#F6E05E"/>
  <rect x="23" y="20" width="3" height="3" fill="#F6E05E"/>
  
  <!-- Legs (skirt) -->
  <rect x="11" y="26" width="10" height="6" fill="#553C9A"/>
  
  <!-- Shoes -->
  <rect x="11" y="30" width="4" height="2" fill="#1A202C"/>
  <rect x="17" y="30" width="4" height="2" fill="#1A202C"/>
</svg>
