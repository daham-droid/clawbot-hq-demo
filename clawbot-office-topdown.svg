  <rect x="565" y="20" width="8" height="8" fill="#48BB78"/>
  <rect x="575" y="15" width="8" height="8" fill="#48BB78"/>
  <rect x="585" y="20" width="8" height="8" fill="#48BB78"/>
  <rect x="575" y="25" width="8" height="8" fill="#68D391"/>
  
