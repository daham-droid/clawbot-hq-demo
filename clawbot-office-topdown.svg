  <circle cx="150" cy="80" r="12" fill="#F7FAFC"/>
  <rect x="150" y="72" width="2" height="8" fill="#1A202C"/>
  <rect x="150" y="78" width="6" height="2" fill="#1A202C"/>
  
  <!-- Exit door -->
  <rect x="580" y="100" width="15" height="40" fill="#4A5568"/>
  <rect x="582" y="102" width="11" height="36" fill="#2D3748"/>
  <rect x="588" y="120" width="3" height="6" fill="#FBBF24"/>
