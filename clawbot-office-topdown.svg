  <rect x="50" y="180" width="80" height="60" fill="#8B4513"/>
  <rect x="50" y="180" width="80" height="10" fill="#654321"/>
  <!-- Legs -->
  <rect x="55" y="240" width="8" height="15" fill="#654321"/>
  <rect x="117" y="240" width="8" height="15" fill="#654321"/>
