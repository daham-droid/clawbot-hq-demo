  <rect x="50" y="50" width="80" height="10" fill="#654321"/>
  <!-- Desk legs -->
  <rect x="55" y="110" width="8" height="15" fill="#654321"/>
  <rect x="117" y="110" width="8" height="15" fill="#654321"/>
  <!-- Computer -->
  <rect x="70" y="35" width="40" height="25" fill="#1A202C"/>
  <rect x="75" y="40" width="30" height="15" fill="#48BB78"/>
