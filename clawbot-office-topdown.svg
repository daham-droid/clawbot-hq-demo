  <rect x="25" y="350" width="8" height="8" fill="#48BB78"/>
  <rect x="35" y="345" width="8" height="8" fill="#48BB78"/>
  <rect x="45" y="350" width="8" height="8" fill="#48BB78"/>
  <rect x="35" y="355" width="8" height="8" fill="#68D391"/>
  
