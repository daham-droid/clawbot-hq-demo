<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Architect Agent - 32x32 Pixel Art -->
  
  <!-- Body (blue hoodie with laptop) -->
  <rect x="10" y="14" width="12" height="12" fill="#4299E1"/>
  <rect x="10" y="14" width="12" height="4" fill="#3182CE"/>
  
  <!-- Head -->
  <rect x="11" y="6" width="10" height="8" fill="#F6E05E"/>
  
  <!-- Hair (short, messy) -->
  <rect x="10" y="5" width="12" height="3" fill="#4A5568"/>
  <rect x="9" y="6" width="2" height="3" fill="#4A5568"/>
  <rect x="21" y="6" width="2" height="3" fill="#4A5568"/>
  
  <!-- Glasses -->
  <rect x="12" y="9" width="3" height="2" fill="#1A202C"/>
  <rect x="17" y="9" width="3" height="2" fill="#1A202C"/>
  <rect x="15" y="9" width="2" height="1" fill="#1A202C"/>
  <!-- Lens shine -->
  <rect x="13" y="9" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="18" y="9" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Laptop (held) -->
  <rect x="22" y="17" width="8" height="6" fill="#4A5568"/>
  <rect x="23" y="18" width="6" height="4" fill="#48BB78"/>
  <!-- Code lines on screen -->
  <rect x="24" y="19" width="4" height="1" fill="#68D391"/>
  <rect x="24" y="20" width="3" height="1" fill="#68D391"/>
  <rect x="24" y="21" width="4" height="1" fill="#68D391"/>
  
  <!-- Arms -->
  <rect x="8" y="16" width="2" height="8" fill="#F6E05E"/>
  <rect x="22" y="16" width="2" height="6" fill="#F6E05E"/>
  
  <!-- Hands -->
  <rect x="7" y="22" width="3" height="3" fill="#F6E05E"/>
  <rect x="23" y="20" width="3" height="3" fill="#F6E05E"/>
  
  <!-- Legs (jeans) -->
  <rect x="12" y="26" width="3" height="6" fill="#2B6CB0"/>
  <rect x="17" y="26" width="3" height="6" fill="#2B6CB0"/>
  
  <!-- Sneakers -->
  <rect x="11" y="30" width="5" height="2" fill="#E53E3E"/>
  <rect x="16" y="30" width="5" height="2" fill="#E53E3E"/>
</svg>
