<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Analyst Agent - 32x32 Pixel Art -->
  
  <!-- Body (purple sweater vest) -->
  <rect x="10" y="14" width="12" height="12" fill="#9F7AEA"/>
  <rect x="10" y="14" width="12" height="4" fill="#805AD5"/>
  
  <!-- White shirt underneath -->
  <rect x="14" y="14" width="4" height="8" fill="#FFFFFF"/>
  
  <!-- Head -->
  <rect x="11" y="6" width="10" height="8" fill="#F6E05E"/>
  
  <!-- Hair (neat, professional) -->
  <rect x="10" y="5" width="12" height="3" fill="#2D3748"/>
  <rect x="9" y="6" width="2" height="4" fill="#2D3748"/>
  <rect x="21" y="6" width="2" height="4" fill="#2D3748"/>
  
  <!-- Glasses (thick frames) -->
  <rect x="11" y="8" width="4" height="4" fill="#1A202C"/>
  <rect x="17" y="8" width="4" height="4" fill="#1A202C"/>
  <rect x="12" y="9" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="9" width="2" height="2" fill="#FFFFFF"/>
  <rect x="15" y="9" width="2" height="1" fill="#1A202C"/>
  
  <!-- Tablet with charts -->
  <rect x="22" y="16" width="8" height="10" fill="#2D3748"/>
  <rect x="23" y="17" width="6" height="8" fill="#FFFFFF"/>
  <!-- Bar chart -->
  <rect x="24" y="22" width="1" height="2" fill="#48BB78"/>
  <rect x="25" y="20" width="1" height="4" fill="#48BB78"/>
  <rect x="26" y="19" width="1" height="5" fill="#E53E3E"/>
  <rect x="27" y="21" width="1" height="3" fill="#4299E1"/>
  <!-- Line graph -->
  <rect x="24" y="18" width="4" height="1" fill="#A0AEC0"/>
  
  <!-- Arms -->
  <rect x="8" y="16" width="2" height="8" fill="#F6E05E"/>
  <rect x="22" y="16" width="2" height="6" fill="#F6E05E"/>
  
  <!-- Hands -->
  <rect x="7" y="22" width="3" height="3" fill="#F6E05E"/>
  <rect x="23" y="20" width="3" height="3" fill="#F6E05E"/>
  
  <!-- Legs (slacks) -->
  <rect x="12" y="26" width="3" height="6" fill="#4A5568"/>
  <rect x="17" y="26" width="3" height="6" fill="#4A5568"/>
  
  <!-- Professional shoes -->
  <rect x="11" y="30" width="5" height="2" fill="#1A202C"/>
  <rect x="16" y="30" width="5" height="2" fill="#1A202C"/>
</svg>
