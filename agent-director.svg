<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Director Agent - 32x32 Pixel Art -->
  
  <!-- Body (dark suit) -->
  <rect x="10" y="14" width="12" height="12" fill="#2D3748"/>
  <rect x="10" y="14" width="12" height="4" fill="#1A202C"/>
  
  <!-- Head -->
  <rect x="11" y="6" width="10" height="8" fill="#F6E05E"/>
  
  <!-- Hair (neat, dark) -->
  <rect x="10" y="5" width="12" height="3" fill="#1A202C"/>
  <rect x="9" y="6" width="2" height="4" fill="#1A202C"/>
  <rect x="21" y="6" width="2" height="4" fill="#1A202C"/>
  
  <!-- Eyes (focused/serious) -->
  <rect x="12" y="9" width="3" height="2" fill="#1A202C"/>
  <rect x="17" y="9" width="3" height="2" fill="#1A202C"/>
  <!-- Eyebrows -->
  <rect x="12" y="8" width="3" height="1" fill="#1A202C"/>
  <rect x="17" y="8" width="3" height="1" fill="#1A202C"/>
  
  <!-- Tie (red) -->
  <rect x="15" y="14" width="2" height="10" fill="#E53E3E"/>
  <rect x="14" y="14" width="4" height="3" fill="#C53030"/>
  
  <!-- Target symbol on chest -->
  <circle cx="19" cy="18" r="2" fill="#FBBF24"/>
  <circle cx="19" cy="18" r="1" fill="#1A202C"/>
  
  <!-- Arms -->
  <rect x="8" y="16" width="2" height="8" fill="#F6E05E"/>
  <rect x="22" y="16" width="2" height="8" fill="#F6E05E"/>
  
  <!-- Hands -->
  <rect x="7" y="22" width="3" height="3" fill="#F6E05E"/>
  <rect x="22" y="22" width="3" height="3" fill="#F6E05E"/>
  
  <!-- Legs (suit pants) -->
  <rect x="12" y="26" width="3" height="6" fill="#1A202C"/>
  <rect x="17" y="26" width="3" height="6" fill="#1A202C"/>
  
  <!-- Dress shoes -->
  <rect x="11" y="30" width="5" height="2" fill="#000000"/>
  <rect x="16" y="30" width="5" height="2" fill="#000000"/>
  
  <!-- Clipboard (manager tool) -->
  <rect x="24" y="15" width="6" height="8" fill="#8B4513"/>
  <rect x="25" y="16" width="4" height="6" fill="#F7FAFC"/>
  <!-- Checklist -->
  <rect x="26" y="18" width="2" height="2" fill="#48BB78"/>
  <rect x="26" y="21" width="2" height="2" fill="#E53E3E"/>
</svg>
